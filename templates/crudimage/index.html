<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <style>
        :root{--accent:#3b82f6;--muted:#6b7280;--bg:#f8fafc}
        body{font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#111;margin:0;padding:24px}
        .container{max-width:1000px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(13,38,59,0.08)}
        h1{margin:0 0 16px;font-size:1.6rem;color:#0f172a}
        .actions{margin:12px 0}
        .btn{display:inline-block;padding:8px 12px;background:var(--accent);color:#fff;text-decoration:none;border-radius:6px;font-size:0.95rem}
        table{width:100%;border-collapse:collapse;background:transparent}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #e6eef8;vertical-align:middle}
        th{background:#f1f5f9;color:var(--muted);font-weight:600;font-size:0.9rem}
        tr:hover td{background:#fbfdff}
        img.user-img{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #e6eef8}
        .actions-cell a.edit{color:var(--accent);margin-right:8px;text-decoration:none}
        .delete-btn{background:#ef4444;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
        @media (max-width:700px){
            table,thead,tbody,tr,th,td{display:block}
            th{display:none}
            tr{margin-bottom:12px;border-radius:8px;background:#fff;padding:12px}
            td{border:none;padding:6px}
            td::before{content:attr(data-label);font-weight:600;display:block;color:var(--muted);margin-bottom:6px}
            img.user-img{width:100%;height:160px}
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Users</h1>

    <div class="actions">
        <a class="btn" href="/crudimage/create">Add User</a>
    </div>

    <table>

    <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for crudimage in crudimages %}

    <tr>
        <td data-label="ID">{{ crudimage.id }}</td>
        <td data-label="Image"><img class="user-img" src="../../uploads/blogs/{{ crudimage.passport }}" alt="Image"></td>
        <td data-label="Name">{{ crudimage.name }}</td>
        {% if crudimage.email %}
        <td data-label="Email">{{ crudimage.email }}</td>
        {% else %}
        <td data-label="Email">N/A</td>
        {% endif %}
        <td data-label="Age">{{ crudimage.age }}</td>
        <td data-label="Date">{{ crudimage.created_at.strftime("%A, %B %d, %Y") }}</td>
        <td data-label="Action" class="actions-cell">
            <a class="edit" href="/crudimage/edit/{{ crudimage.id }}">Edit</a>
            <form method="post" action="/crudimage/delete/{{ crudimage.id }}" style="display:inline;">
                <button class="delete-btn" type="submit">Delete</button>
            </form>
        </td>
    </tr>

    {% endfor %}

</table>
</body>
</html>
