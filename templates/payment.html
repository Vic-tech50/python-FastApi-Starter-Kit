<!DOCTYPE html>
<html>
<head>
    <title>Paystack Payment</title>
</head>
<body>

<h2>Make Payment</h2>

<form method="post" action="/paystack/pay">

    <label>Email</label>
    <br>

    <input
        type="email"
        name="email"
        required
    >

    <br><br>

    <label>Amount (NGN)</label>
    <br>

    <input
        type="number"
        name="amount"
        required
    >

    <br><br>

    <button type="submit">
        Pay Now
    </button>

</form>

</body>
</html>
