<h1>Users</h1>

<a href="/users/create">
    Add User
</a>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for blog in blogs %}

    <tr>
        <td>{{ blog.id }}</td>
        <td>{{ blog.title }}</td>
        <td>{{ blog.description }}</td>
        <td>{{ blog.created_at.strftime("%A, %B %d, %Y") }}</td>
        <td>
            <a href="/crud/blog/edit/{{ blog.id }}">Edit</a>
            <form method="post" action="/crud/blog/delete/{{ blog.id }}" style="display:inline;">
                <button type="submit">Delete</button>
            </form>
      
    </tr>

    {% endfor %}

</table>
