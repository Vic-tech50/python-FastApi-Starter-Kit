<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

        {% if success %}
<div class="alert alert-success">
    {{ success }}
</div>
{% endif %}


    {% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}
    <form method="post" action="/otp/verify-otp">

    <input
        type="text"
        name="otp"
        placeholder="Enter OTP"
        required
    >

    <button type="submit">
        Verify
    </button>

</form>
</body>
</html>
